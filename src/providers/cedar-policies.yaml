## Cedar Policy Engine -- Default Policy Definitions
##
## Deterministic guardrails that validate LLM-generated commands
## against a policy file before execution.
##
## Two modes:
##   audit   -- log violations during normal Claude operation
##   enforce -- block + notify during fallback model operation

policies:
  # Always forbidden regardless of mode or provider
  critical_block:
    patterns:
      - "rm -rf /"
      - "rm -rf /*"
      - "rm -rf ~"
      - "rm -rf ."
      - "git push --force.*main"
      - "git push --force.*master"
      - "git push -f.*main"
      - "git push -f.*master"
      - "DROP DATABASE"
      - "DROP TABLE"
      - "TRUNCATE TABLE"
      - "format c:"
      - "format C:"
      - "del /f /s /q"
      - "del /f /s /q C:\\"
      - "rd /s /q C:\\"
      - "shutdown /s"
      - "shutdown /r"
      - "shutdown -h"
      - "shutdown -r"
      - "reboot"
      - "init 0"
      - "init 6"
      - "mkfs\\."
      - "dd if=.* of=/dev/"
      - ":(){ :|:& };:"
      - "chmod -R 777 /"
      - "chown -R .* /"
      - "> /dev/sda"
      - "mv .* /dev/null"
    action: forbid
    reason: "Destructive system command blocked by policy"

  # Forbidden during fallback, audited during Claude
  fallback_restricted:
    patterns:
      - "npm publish"
      - "git push"
      - "git push origin"
      - "pm2 delete"
      - "pm2 restart"
      - "pm2 stop"
      - "docker rm"
      - "docker stop"
      - "docker kill"
      - "docker system prune"
      - "kill -9"
      - "kill -KILL"
      - "kill -TERM"
      - "pkill"
      - "killall"
      - "taskkill"
      - "write.*\\.env"
      - "edit.*\\.env"
      - "echo.*>.*\\.env"
      - "fs\\.writeFile.*config"
      - "fs\\.writeFileSync.*config"
      - "sqlite3.*DELETE"
      - "sqlite3.*UPDATE"
      - "sqlite3.*INSERT"
      - "sqlite3.*DROP"
      - "net stop"
      - "net start"
      - "sc stop"
      - "sc delete"
      - "systemctl stop"
      - "systemctl disable"
      - "service .* stop"
      - "iptables"
      - "netsh"
      - "reg delete"
      - "reg add"
      - "wmic"
    action: forbid_on_fallback
    reason: "Write/destructive operation blocked during fallback mode"

  # Require approval during fallback
  fallback_approval:
    patterns:
      - "npm install"
      - "npm uninstall"
      - "npm update"
      - "npm ci"
      - "npx"
      - "pip install"
      - "pip uninstall"
      - "pip3 install"
      - "apt install"
      - "apt-get install"
      - "apt remove"
      - "apt-get remove"
      - "brew install"
      - "brew uninstall"
      - "choco install"
      - "winget install"
      - "yarn add"
      - "yarn remove"
      - "pnpm add"
      - "pnpm remove"
      - "git commit"
      - "git merge"
      - "git rebase"
      - "git cherry-pick"
      - "git stash"
      - "mkdir"
      - "touch"
      - "cp "
      - "mv "
      - "New-Item"
      - "Copy-Item"
      - "Move-Item"
    action: require_approval_on_fallback
    reason: "Installation/creation requires approval during fallback mode"

  # Always permitted -- read-only operations
  safe_operations:
    patterns:
      - "git status"
      - "git log"
      - "git diff"
      - "git branch"
      - "git show"
      - "git remote -v"
      - "git rev-parse"
      - "git describe"
      - "ls"
      - "dir"
      - "cat "
      - "type "
      - "head "
      - "tail "
      - "less "
      - "more "
      - "grep "
      - "rg "
      - "find "
      - "fd "
      - "where "
      - "which "
      - "wc "
      - "sort "
      - "uniq "
      - "pm2 status"
      - "pm2 list"
      - "pm2 logs"
      - "pm2 describe"
      - "pm2 jlist"
      - "pm2 monit"
      - "sqlite3.*SELECT"
      - "node --version"
      - "node -v"
      - "npm --version"
      - "npm -v"
      - "npm list"
      - "npm ls"
      - "npm outdated"
      - "npm view"
      - "npm info"
      - "python --version"
      - "python3 --version"
      - "pip list"
      - "pip show"
      - "pip3 list"
      - "pip3 show"
      - "docker ps"
      - "docker images"
      - "docker logs"
      - "docker inspect"
      - "docker stats"
      - "echo "
      - "date"
      - "whoami"
      - "hostname"
      - "uname"
      - "uptime"
      - "df "
      - "du "
      - "free"
      - "top -b -n 1"
      - "pwd"
      - "env"
      - "printenv"
      - "systeminfo"
      - "tasklist"
      - "curl.*--head"
      - "curl -I"
      - "ping "
      - "nslookup"
      - "dig "
      - "tracert"
      - "traceroute"
      - "netstat"
      - "ss "
      - "tsc --noEmit"
      - "npx tsc --noEmit"
      - "npx vitest"
      - "npm run build"
      - "npm test"
      - "npm run test"
    action: permit
    reason: "Read-only operation"
